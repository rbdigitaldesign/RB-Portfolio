name: Auto-create PR for Claude branches

on:
  push:
    branches:
      - 'claude/**'

jobs:
  create-pr:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Create PR if one doesn't exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ github.ref_name }}"
          # Check for an existing open PR from this branch
          EXISTING=$(gh pr list --head "$BRANCH" --base main --state open --json number --jq '.[0].number')
          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING already exists for $BRANCH — skipping"
          else
            gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "Claude: $BRANCH" \
              --body "Automated PR from Claude session on branch \`$BRANCH\`."
            echo "PR created for $BRANCH"
          fi
