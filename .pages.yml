media:
  input: public/uploads
  output: /uploads

content:
  - name: blog
    label: Blog Posts
    path: src/content/blog
    type: collection
    extension: mdx
    view:
      fields: [title, date, status]
    fields:
      - { name: title,      label: Title,       type: string }
      - { name: date,       label: Date,        type: date }
      - { name: summary,    label: Summary,     type: text }
      - name: tags
        label: Tags
        type: select
        multiple: true
        options:
          values:
            - UX Design
            - Learning Design
            - Tools
            - Research
            - Career
            - Biomimicry
            - Design Principles
            - Innovation
            - Sustainability
            - Beginners
      - name: status
        label: Status
        type: select
        options:
          values:
            - draft
            - published
      - { name: coverImage, label: Cover Image,  type: image }
      - { name: author,     label: Author,       type: string }
      - { name: body,       label: Content,      type: rich-text }

  - name: publications
    label: Publications
    path: src/content/publications
    type: collection
    extension: mdx
    view:
      fields: [title, year, status]
    fields:
      - { name: title,         label: Title,         type: string }
      - { name: year,          label: Year,          type: number }
      - { name: venue,         label: Venue,         type: string }
      - name: status
        label: Status
        type: select
        options:
          values:
            - published
            - unpublished
      - { name: collaborators, label: Collaborators, type: string }
      - { name: abstract,      label: Abstract,      type: text }
      - { name: url,           label: URL,           type: string }
      - { name: body,          label: Content,       type: rich-text }

  - name: frameworks
    label: Frameworks
    path: src/content/frameworks
    type: collection
    extension: mdx
    view:
      fields: [title, category, status]
    fields:
      - { name: title,                  label: Title,                   type: string }
      - name: category
        label: Category
        type: select
        options:
          values:
            - Design Principle
            - Mental Model
            - Framework
            - Mechanism
            - Heuristic
            - Design Rule
      - { name: summary,                label: One-line summary,        type: string }
      - { name: why_i_like_it,          label: Why I Like It,           type: text }
      - { name: where_i_heard_it,       label: Where I Heard About It,  type: text }
      - { name: real_world_application, label: Real World Application,  type: text }
      - name: status
        label: Status
        type: select
        options:
          values:
            - draft
            - published
      - { name: body,                   label: What It Is (Explanation), type: rich-text }
